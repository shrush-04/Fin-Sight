{% extends 'base.html' %}

{% block title %}Register - FinSight{% endblock %}

{% block content %}
<div class="auth-container animate-fade-in-up">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo logo-large">
                <span class="logo-icon"><i class="fa-solid fa-chart-line"></i></span>
                <span class="logo-text">FinSight</span>
            </div>
            <h2>Create an account</h2>
            <p>Join FinSight today to track and budget your expenses.</p>
        </div>
        
        <form method="POST" action="{{ url_for('register') }}" class="auth-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-user input-icon"></i>
                    <input type="text" id="name" name="name" required placeholder="John Doe" autocomplete="name">
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-envelope input-icon"></i>
                    <input type="email" id="email" name="email" required placeholder="name@example.com" autocomplete="email">
                </div>
            </div>

            <div class="form-group">
                <label for="monthly_income">Monthly Income (Default Currency)</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-coins input-icon"></i>
                    <input type="number" id="monthly_income" name="monthly_income" required min="0" step="any" placeholder="50000">
                </div>
            </div>
            
            <div class="form-group-row">
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="password" name="password" required minlength="6" placeholder="Min. 6 characters" autocomplete="new-password">
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="confirm_password" name="confirm_password" required minlength="6" placeholder="Repeat password" autocomplete="new-password">
                    </div>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('login') }}">Log in here</a></p>
        </div>
    </div>
</div>
{% endblock %}
